---
# yaml-language-server: $schema=https://k8s-schemas.home-operations.com/kustomize.toolkit.fluxcd.io/kustomization_v1.json
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: tuppr
spec:
  interval: 1h
  path: ./base/system-upgrade/tuppr/app
  prune: true
  sourceRef:
    kind: ExternalArtifact
    name: infrastructure
    namespace: flux-system
  targetNamespace: system-upgrade
  wait: true
---
# yaml-language-server: $schema=https://k8s-schemas.home-operations.com/kustomize.toolkit.fluxcd.io/kustomization_v1.json
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: tuppr-upgrades
spec:
  dependsOn:
    - name: tuppr
  interval: 1h
  path: ./base/system-upgrade/tuppr/upgrades
  prune: true
  sourceRef:
    kind: ExternalArtifact
    name: infrastructure
    namespace: flux-system
  targetNamespace: system-upgrade
  wait: false